<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Payment Gateway</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 3px solid #fff;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen antialiased text-slate-800">

    <div class="w-full max-w-md p-6 mx-4 bg-white rounded-2xl shadow-xl border border-slate-100">
        <div class="flex items-center justify-between mb-8 pb-4 border-b border-slate-100">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center text-white font-bold text-sm">⚡</div>
                <span class="font-semibold text-lg tracking-tight text-slate-900">ApexPay</span>
            </div>
            <span class="text-xs font-medium px-2.5 py-1 bg-amber-50 text-amber-700 rounded-full border border-amber-200">
                Mock Sandbox
            </span>
        </div>

        <div class="mb-6 p-4 bg-slate-50 rounded-xl space-y-2">
            <div class="flex justify-between items-center">
                <span class="text-sm text-slate-500">Flight Number</span>
                <span class="text-sm font-mono font-bold text-slate-900">$flight_number</span>
            </div>
            <div class="flex justify-between items-center pt-2 border-t border-slate-200/60">
                <span class="text-sm text-slate-500">Total Price</span>
                <span class="text-lg font-bold text-indigo-600">$$$price</span>
            </div>
        </div>

        <form id="paymentForm" class="space-y-4" onsubmit="handlePayment(event)">
            <div>
                <label class="block text-xs font-semibold text-slate-600 uppercase tracking-wider mb-1">Cardholder Name</label>
                <input type="text" required value="Alex Doe" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-lg text-sm">
            </div>
            <div>
                <label class="block text-xs font-semibold text-slate-600 uppercase tracking-wider mb-1">Card Number</label>
                <input type="text" required value="4111 •••• •••• 8888" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-lg text-sm font-mono">
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-semibold text-slate-600 uppercase tracking-wider mb-1">Expiry</label>
                    <input type="text" required value="12/29" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-lg text-sm font-mono">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-600 uppercase tracking-wider mb-1">CVC</label>
                    <input type="password" required value="123" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-lg text-sm font-mono">
                </div>
            </div>

            <button type="submit" id="submitBtn" class="w-full mt-6 bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-3 px-4 rounded-lg flex items-center justify-center gap-2 cursor-pointer shadow-sm">
                <span id="btnText">Confirm Payment</span>
                <div id="btnSpinner" class="spinner hidden"></div>
            </button>
        </form>

        <p class="text-center text-xs text-slate-400 mt-6">
            🔒 Local MCP simulation. No real funds are processed.
        </p>
    </div>

    <script>
        function handlePayment(event) {
            event.preventDefault();

            const btnText = document.getElementById('btnText');
            const btnSpinner = document.getElementById('btnSpinner');
            const submitBtn = document.getElementById('submitBtn');

            btnText.textContent = "Processing...";
            btnSpinner.classList.remove('hidden');
            submitBtn.disabled = true;
            submitBtn.classList.add('opacity-75', 'cursor-not-allowed');

            setTimeout(() => {
                window.close();
            }, 1500);
        }
    </script>
</body>
</html>
